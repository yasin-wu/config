build:
  stage: build
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature-.*/'
  tags:
    - ${RUNNER}
  script:
    - make buildi VERSION=${VERSION} ARCH=amd64
    - make buildi VERSION=${VERSION} ARCH=arm64