.push_base: &push_base
  stage: push
  tags:
    - ${RUNNER}

push_latest:
  <<: *push_base
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH =~ /^feature-.*/'
  script:
    - docker push yasin/${APP}:latest
    - docker push yasin/${APP}-arm64:latest
    - docker push yasin/${APP}-sw64:latest

push_version:
  <<: *push_base
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "develop"'
  script:
    - docker push yasin/${APP}:${VERSION}
    - docker push yasin/${APP}-arm64:${VERSION}
    - docker push yasin/${APP}-sw64:${VERSION}
